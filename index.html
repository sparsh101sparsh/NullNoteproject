<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LectureSnap Extension</title>
  </head>
  <body>
    <main style="font-family: Inter, system-ui, sans-serif; min-height: 100vh; display: grid; place-items: center; background: linear-gradient(180deg, #0f172a 0%, #020617 100%); color: #f8fafc;">
      <div style="text-align:center; max-width: 540px; padding: 32px;">
        <h1>LectureSnap</h1>
        <p>Use <code>npm run build</code> to generate extension assets. Load the <code>dist</code> folder into Chrome as an unpacked extension.</p>
      </div>
    </main>
  </body>
</html>
